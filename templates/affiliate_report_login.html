<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>團購報表登入</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, "Noto Sans TC", sans-serif;
            background: #faf7f5;
            color: #2b2725;
        }

        .login-card {
            width: min(420px, calc(100% - 32px));
            background: #fff;
            border: 1px solid #eadfdb;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 18px 45px rgba(80, 54, 44, .08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .sub {
            margin-bottom: 24px;
            color: #827671;
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 800;
        }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid #ddd3ce;
            border-radius: 14px;
            padding: 0 14px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #bd5f78;
            box-shadow: 0 0 0 4px rgba(189, 95, 120, .12);
        }

        button {
            width: 100%;
            height: 48px;
            margin-top: 18px;
            border: none;
            border-radius: 14px;
            background: #bd5f78;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(189, 95, 120, .22);
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            background: #fff1f2;
            color: #b42342;
            font-weight: 800;
            border: 1px solid #fecdd3;
        }
    </style>
</head>
<body>
    <form class="login-card" method="post">
        <h1>團購報表登入</h1>
        <div class="sub">
            {{ affiliate.name }} / {{ affiliate.code }}<br>
            請輸入報表密碼後查看專屬統計。
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <label>報表密碼</label>
        <input type="password" name="password" required autofocus>

        <button type="submit">查看報表</button>
    </form>
</body>
</html>
